<!DOCTYPE html>
<html>
<head>
<title>Helpdesk System</title>
<style>
   body {
     font-family: Arial;
     background: #f5f6fa;
     padding: 20px;
   }
   h2 {
     color: #2f3640;
   }
   .box {
     background: white;
     padding: 15px;
     border-radius: 10px;
     margin-bottom: 20px;
     box-shadow: 0 0 10px rgba(0,0,0,0.1);
   }
   input {
     padding: 10px;
     margin: 5px;
     width: 200px;
   }
   button {
     padding: 8px 12px;
     margin: 5px;
     border: none;
     border-radius: 5px;
     cursor: pointer;
   }
   .create { background: green; color: white; }
   .show { background: blue; color: white; }
   .update { background: orange; color: white; }
   .delete { background: red; color: white; }
   .comment { background: purple; color: white; }
   li {
     background: #f1f2f6;
     padding: 10px;
     margin: 10px 0;
     border-radius: 8px;
   }
</style>
</head>
<body>
<h1>Helpdesk Ticket System</h1>
<div class="box">
<h2>Create Ticket</h2>
<input id="title" placeholder="Title">
<input id="desc" placeholder="Description">
<br>
<button class="create" onclick="createTicket()">Create Ticket</button>
</div>
<div class="box">
  <input id="search" placeholder="Search ticket">
<button onclick="searchTicket()">Search</button>
<h2>All Tickets</h2>
<button onclick="filterTickets('Open')">Open</button>
<button onclick="filterTickets('Completed')">Completed</button>
<button onclick="getTickets()">All</button>
<button class="show" onclick="getTickets()">Show Tickets</button>
<ul id="list"></ul>
</div>
<div class="box">
<h2>Users (Dummy API)</h2>
<button onclick="loadUsers()">Load Users</button>
<ul id="users"></ul>
</div>
<script>
// CREATE
function createTicket(){
 fetch("http://localhost:5000/tickets", {
   method:"POST",
   headers: {"Content-Type":"application/json"},
   body: JSON.stringify({
     title: document.getElementById("title").value,
     description: document.getElementById("desc").value
   })
 })
 .then(res=>res.json())
 .then(()=>{
   alert("Ticket Created");
   getTickets();
 });
}
// GET
function getTickets(){
 fetch("http://localhost:5000/tickets")
 .then(res=>res.json())
 .then(data=>{
   let list="";
   data.forEach((t,i)=>{
     list += `
<li>
<b>${t.title}</b> - ${t.status}
<br>
<small>${t.description || ""}</small>
<br>
<b>Comments:</b> ${(t.comments || []).join(", ")}
<br><br>
<button class="update" onclick="updateStatus(${i})">Update</button>
<button class="delete" onclick="deleteTicket(${i})">Delete</button>
<button class="comment" onclick="addComment(${i})">Comment</button>
</li>
     `;
   });
   document.getElementById("list").innerHTML = list;
 });
}
// UPDATE
function updateStatus(id){
 fetch(`http://localhost:5000/tickets/${id}`,{
   method:"PUT",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     status:"Completed"
   })
 })
 .then(()=>{
   alert("Updated");
   getTickets();
 });
}
// DELETE
function deleteTicket(id){
 fetch(`http://localhost:5000/tickets/${id}`,{
   method:"DELETE"
 })
 .then(()=>{
   alert("Deleted");
   getTickets();
 });
}
// COMMENT
function addComment(id){
 const comment = prompt("Enter comment");
 fetch(`http://localhost:5000/tickets/${id}/comment`,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({ comment })
 })
 .then(()=>{
   alert("Comment added");
   getTickets();
 });
}
// DUMMY USERS
function loadUsers(){
 fetch("https://jsonplaceholder.typicode.com/users")
 .then(res=>res.json())
 .then(data=>{
   let list="";
   data.forEach(user=>{
     list += `<li>${user.name}</li>`;
   });
   document.getElementById("users").innerHTML = list;
 });
}
function searchTicket(){
 const text = document.getElementById("search").value.toLowerCase();
 fetch("http://localhost:5000/tickets")
 .then(res=>res.json())
 .then(data=>{
   let list = "";
   data.forEach((t,i)=>{
     if(t.title.toLowerCase().includes(text)){
       list += `
<li>
           ${t.title} - ${t.status}
<br>
           Comments: ${(t.comments || []).join(", ")}
</li>
<br>
       `;
     }
   });
   document.getElementById("list").innerHTML = list;
 });
}
function filterTickets(status){
 fetch("http://localhost:5000/tickets")
 .then(res=>res.json())
 .then(data=>{
   let list="";
   data.forEach((t,i)=>{
     if(t.status === status){
       list += `
<li>
           ${t.title} - ${t.status}
</li>
<br>
       `;
     }
   });
   document.getElementById("list").innerHTML = list;
 });
}
</script>
</body>
</html>
